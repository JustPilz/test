        }

        .suggestions {

            right: 0;

            border-radius: 8px;

            list-style: none;

        .suggestions li button {

            padding: 0.5rem 0.75rem;

            background: transparent;
            cursor: pointer;
            font-size: 0.9rem;

            flex-direction: column;
            gap: 0.15rem;

        }

            color: #111;
        }

        .suggestions .email {

            color: #4a5568;
        }

        function normalizeUsers(payload) {
            const raw = Array.isArray(payload) ? payload : payload?.users;
            if (!Array.isArray(raw)) return [];
            return raw
                .map((u) => {
                    const fn = u.firstname ?? u.firstName ?? "";
                    const ln = u.lastname ?? u.lastName ?? "";
                    const nameFromParts = [fn, ln].filter(Boolean).join(" ").trim();
                    const name =
                        (u.name && String(u.name).trim()) || nameFromParts || "";
                    const username = u.login?.username ?? u.username ?? "";
                    return {
                        id: u.id,
                        name,
                        email: String(u.email || ""),
                        username: String(username),
                        company: String(u.company || ""),
                    };
                })
                .filter((u) => u.email);
        }

        function isValidEmail(s) {
            const t = String(s).trim();
            if (!t) return false;
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(t);
        }

        function catalogUserForEmail(addr, catalog) {
            const key = String(addr).trim().toLowerCase();
            if (!key || !Array.isArray(catalog)) return null;
            return (
                catalog.find(
                    (x) => x.email && String(x.email).trim().toLowerCase() === key
                ) || null
            );
        }

        function hasCatalogDisplayName(addr, catalog) {
            const u = catalogUserForEmail(addr, catalog);
            return !!(u?.name && String(u.name).trim());
        }

        /** Если email есть в каталоге с именем — «Имя Фамилия (email)», иначе как есть */
        function formatListEmailLabel(addr, catalog) {
            const raw = String(addr).trim();
            const u = catalogUserForEmail(addr, catalog);
            const nm = u?.name && String(u.name).trim();
            if (nm) return `${nm} (${raw})`;
            return raw;
        }

        /** Разбивает строку по запятым и пробелам, убирает пустые куски */
        function splitEmails(raw) {
            return String(raw)
                .split(/[\s,]+/)
                .map((x) => x.trim())
                .filter(Boolean);
        }

        /** 30 шт.: 70% из USERS_LOCAL_RAW, 20% валидные не из списка, 10% с ошибками */

        function App() {
            const [input, setInput] = useState("");
            const [emails, setEmails] = useState([]);
            const [users, setUsers] = useState([]);
            const [usersLoading, setUsersLoading] = useState(true);
            const [searchOpen, setSearchOpen] = useState(false);
            const inputRef = useRef(null);
            const listRef = useRef(null);
            const prevEmailLenRef = useRef(0);
            const copyFeedbackTimerRef = useRef(null);
            const [copyFeedback, setCopyFeedback] = useState("");

            useEffect(() => {
                if (emails.length > prevEmailLenRef.current) {
                    const ul = listRef.current;
                    if (ul) ul.scrollTop = ul.scrollHeight;
                }
                prevEmailLenRef.current = emails.length;
            }, [emails]);

            const invalidEmailCount = useMemo(
                () => emails.filter((a) => !isValidEmail(a)).length,
                [emails]
            );

            const scrollToFirstInvalid = useCallback(() => {
                const el = listRef.current?.querySelector("li.invalid");
                el?.scrollIntoView({ block: "nearest", behavior: "smooth" });
            }, []);

            useEffect(() => {
                return () => {
                    if (copyFeedbackTimerRef.current) {
                        window.clearTimeout(copyFeedbackTimerRef.current);
                    }
                };
            }, []);

            useEffect(() => {
                let cancelled = false;
                const delayMs = 500 + Math.floor(Math.random() * 501);
                const timerId = window.setTimeout(() => {
                    if (!cancelled) {
                        setUsers(normalizeUsers(USERS_LOCAL_RAW));
                        setUsersLoading(false);
                    }
                }, delayMs);
                return () => {
                    cancelled = true;
                    window.clearTimeout(timerId);
                };
            }, []);

            const addEmails = useCallback((tokens) => {
                const list = Array.isArray(tokens) ? tokens : splitEmails(tokens);
                if (!list.length) return;
                setEmails((prev) => {
                    const seen = new Set(prev.map((e) => e.toLowerCase()));
                    const next = [...prev];
                    for (const raw of list) {
                        const e = raw.trim();
                        if (!e) continue;
                        const key = e.toLowerCase();
                        if (seen.has(key)) continue;
                        seen.add(key);
                        next.push(e);
                    }
                    return next;
                });
            }, []);

            const removeAt = useCallback((index) => {
                setEmails((prev) => prev.filter((_, i) => i !== index));
            }, []);

            const query = input.trim().toLowerCase();
            const suggestions = useMemo(() => {
                if (!query || query.length < 1) return [];
                return users
                    .filter((u) => {
                        const name = (u.name || "").toLowerCase();
                        const mail = (u.email || "").toLowerCase();
                        const un = (u.username || "").toLowerCase();
                        const co = (u.company || "").toLowerCase();
                        return (
                            name.includes(query) ||
                            mail.includes(query) ||
                            un.includes(query) ||
                            co.includes(query)
                        );
                    })
                    .slice(0, 8);
            }, [users, query]);

            const flushInputToList = useCallback(
                (opts = {}) => {
                    const { requireAt = false } = opts;
                    const parts = splitEmails(input);
                    if (!parts.length) return;
                    if (requireAt && !parts.some((p) => p.includes("@"))) return;
                    addEmails(parts);
                    setInput("");
                },
                [input, addEmails]
            );

            const handlePaste = useCallback(
                (e) => {
                    const text = e.clipboardData?.getData("text") ?? "";
                    const parts = splitEmails(text);
                    if (parts.length) {
                        e.preventDefault();
                        addEmails(parts);
                    }
                },
                [addEmails]
            );

            const handleChange = (e) => {
                const v = e.target.value;
                /** Пробел/запятая в конце: если все токены похожи на email — в список, иначе оставляем для поиска по имени */
                if (/[\s,]$/.test(v)) {
                    const core = v.slice(0, -1);
                    const tokens = splitEmails(core);
                    if (
                        tokens.length > 0 &&
                        tokens.every((t) => t.includes("@"))
                    ) {
                        addEmails(tokens);
                        setInput("");
                        return;
                    }
                }
                setInput(v);
            };

            const handleKeyDown = (e) => {
                if (e.key === ",") {
                    e.preventDefault();
                    flushInputToList({ requireAt: false });
                } else if (e.key === "Enter") {
                    e.preventDefault();
                    flushInputToList({ requireAt: true });
                }
            };

            const handleFocus = () => {
                setSearchOpen(true);
            };

            const handleBlur = () => {
                setSearchOpen(false);
                window.setTimeout(() => flushInputToList({ requireAt: true }), 150);
            };

            const pickUser = (email) => {
                addEmails([email]);
                setInput("");
                inputRef.current?.focus();
            };

            const copyTestEmails = useCallback(() => {
                if (copyFeedbackTimerRef.current) {
                    window.clearTimeout(copyFeedbackTimerRef.current);
                    copyFeedbackTimerRef.current = null;
                }
                const done = (ok) => {
                    setCopyFeedback(ok ? "ok" : "err");
                    copyFeedbackTimerRef.current = window.setTimeout(() => {
                        setCopyFeedback("");
                        copyFeedbackTimerRef.current = null;
                    }, ok ? 1600 : 2400);
                };
                if (navigator.clipboard?.writeText) {
                    navigator.clipboard
                        .writeText(TEST_EMAILS_CLIPBOARD)
                        .then(() => done(true))
                        .catch(() => done(false));
                } else {
                    done(false);
                }
            }, []);

            return (
                <>
                    <button
                        type="button"
                        className="copy-test-btn"
                        onClick={copyTestEmails}
                        title="Скопировать тестовый список email в буфер обмена"
                        aria-label="Скопировать тестовый список email в буфер обмена"
                    >
                        <svg
                            width="12"
                            height="12"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            strokeWidth="2"
                            strokeLinecap="round"
                            strokeLinejoin="round"
                            aria-hidden="true"
                        >
                            <rect x="9" y="9" width="13" height="13" rx="2" />
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                        </svg>
                        {copyFeedback === "ok"
                            ? "Скопировано"
                            : copyFeedback === "err"
                                ? "Не удалось"
                                : "Тест в буфер"}
                    </button>
                    <div className="card">
                        <h1>Адреса email</h1>
                        <div className="field-wrap">
                            <input
                                ref={inputRef}
                                type="text"
                                inputMode="email"
                                autoComplete="off"
                                placeholder="Email или поиск по имени…"
                                value={input}
                                onChange={handleChange}
                                onPaste={handlePaste}
                                onKeyDown={handleKeyDown}
                                onFocus={handleFocus}
                                onBlur={handleBlur}
                            />
                            {searchOpen && suggestions.length > 0 && (
                                <ul className="suggestions" role="listbox">
                                    {suggestions.map((u) => (
                                        <li key={u.id} role="option">
                                            <button
                                                type="button"
                                                onMouseDown={(e) => e.preventDefault()}
                                                onClick={() => pickUser(u.email)}
                                            >
                                                <span className="name">{u.name}</span>
                                                <span className="email">{u.email}</span>
                                            </button>
                                        </li>
                                    ))}
                                </ul>
                            )}
                        </div>
                        <p className="hint">
                            {usersLoading
                                ? "Загрузка каталога… (имитация ответа сервера, 500–1000 мс)"
                                : "Разделители: пробел и запятая. Вставка из буфера, Enter или потеря фокуса добавляет в список."}
                        </p>
                        {emails.length !== 0 ? (
                            <>
                                {invalidEmailCount > 0 && (
                                    <div className="invalid-banner" role="alert" aria-live="polite">
                                        <span>
                                            {(() => {
                                                const n = invalidEmailCount;
                                                const n10 = n % 10;
                                                const n100 = n % 100;
                                                let w = "адресов";
                                                if (n10 === 1 && n100 !== 11) w = "адрес";
                                                else if (
                                                    n10 >= 2 &&
                                                    n10 <= 4 &&
                                                    (n100 < 10 || n100 >= 20)
                                                )
                                                    w = "адреса";
                                                return `Некорректный формат у ${n} ${w}`;
                                            })()}
                                        </span>
                                        <button type="button" onClick={scrollToFirstInvalid}>
                                            Показать в списке
                                        </button>
                                    </div>
                                )}
                                <ul className="list" ref={listRef}>
                                    {emails.map((addr, i) => {
                                        const rowLabel = formatListEmailLabel(addr, users);
                                        const named = hasCatalogDisplayName(addr, users);
                                        const rowClass = [
                                            !isValidEmail(addr) && "invalid",
                                            users.length > 0 && !named && "no-name",
                                        ]
                                            .filter(Boolean)
                                            .join(" ");
                                        return (
                                            <li key={`${addr}-${i}`} className={rowClass}>
                                                <span>{rowLabel}</span>
                                                <button
                                                    type="button"
                                                    className="remove"
                                                    onClick={() => removeAt(i)}
                                                    aria-label={`Удалить ${rowLabel}`}
                                                    title="Удалить"
                                                >
                                                    <svg
                                                        width="10"
                                                        height="10"
                                                        viewBox="0 0 10 10"
                                                        aria-hidden="true"
                                                    >
                                                        <path
                                                            d="M2 2 L8 8 M8 2 L2 8"
                                                            stroke="currentColor"
                                                            strokeWidth="1.3"
                                                            strokeLinecap="round"
                                                            fill="none"
                                                        />
                                                    </svg>
                                                </button>
                                            </li>
                                        );
                                    })}
                                </ul>
                            </>
                        ) : undefined}
                    </div>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
